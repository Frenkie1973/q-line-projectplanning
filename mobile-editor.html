<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Q-Line Editor</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Q-Line Edit">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest-editor.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--sf:#111;--sf2:#1a1a1a;--sf3:#222;--bd:#222;--bd2:#2a2a2a;--tx:#f0f0f0;--tx2:#aaa;--tx3:#555;--red:#8B0000;--gold:#c9a84c;--green:#2ecc71;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--tx);font-size:16px}
.screen{position:fixed;inset:0;display:flex;flex-direction:column}
.screen.hidden{display:none!important}
.hdr{background:var(--bg);border-bottom:1px solid var(--bd);padding:0 16px;height:60px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{width:36px;height:36px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:22px;height:22px}
.hdr-titles{flex:1;min-width:0}
.hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-name span{color:var(--gold)}
.hdr-sub{font-size:12px;color:var(--tx3);margin-top:-1px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--gold);font-size:16px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;padding:0;flex-shrink:0}
.back-arr{width:18px;height:18px;fill:none;stroke:var(--gold);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.save-btn{background:var(--red);border:none;color:#fff;font-size:15px;font-weight:600;padding:9px 18px;border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif;flex-shrink:0;transition:background .2s}
.save-btn:disabled{background:var(--sf3);color:var(--tx3)}
.save-btn.dirty{background:#a00}
.save-btn.saving{background:var(--gold);color:#000}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.off{background:var(--tx3)}
.ref-btn{background:none;border:none;cursor:pointer;padding:6px;flex-shrink:0;display:flex;align-items:center;opacity:.7}
.ref-btn:active{opacity:1}
.ref-btn svg{width:20px;height:20px;stroke:var(--tx2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ref-btn.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.list-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.list-cnt{font-size:14px;color:var(--tx3)}
.new-btn{display:flex;align-items:center;gap:6px;background:var(--red);border:none;color:#fff;font-size:15px;font-weight:600;padding:10px 16px;border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif;margin-left:auto}
.proj-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 0 80px}
.proj-list::-webkit-scrollbar{display:none}
.pcard{margin:0 12px 8px;background:var(--sf);border-radius:8px;border:1px solid var(--bd);padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;gap:12px;min-height:80px}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red);border-radius:8px 0 0 8px}
.pcard:active{background:var(--sf2)}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pcard-meta{font-size:13px;color:var(--tx3);line-height:1.4}
.pcard-chev{color:var(--tx3);font-size:22px;flex-shrink:0}
.edit-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 100px}
.edit-scroll::-webkit-scrollbar{display:none}
.sec-head{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin:24px 0 10px;padding-left:2px}
.sec-head:first-child{margin-top:0}
.fgroup{background:var(--sf);border-radius:8px;border:1px solid var(--bd);overflow:hidden;margin-bottom:6px}
.frow{display:flex;align-items:center;padding:0 16px;min-height:58px;border-bottom:1px solid var(--bd);gap:12px}
.frow:last-child{border-bottom:none}
.flabel{font-size:14px;color:var(--tx2);width:100px;flex-shrink:0}
.finput{flex:1;background:none;border:none;color:var(--tx);font-size:17px;font-family:'Barlow',sans-serif;outline:none;min-width:0;padding:14px 0}
.finput::placeholder{color:var(--tx3)}
.finput[type="date"]{color-scheme:dark}
.phases-list{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.phcard{background:var(--sf);border-radius:8px;border:1px solid var(--bd);overflow:hidden}
.ph-hdr{display:flex;align-items:center;padding:14px;gap:10px;cursor:pointer;min-height:64px}
.ph-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.ph-label{flex:1;min-width:0}
.ph-type{font-size:15px;font-weight:700}
.ph-note{font-size:13px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph-del{background:none;border:none;color:var(--tx3);font-size:26px;line-height:1;cursor:pointer;padding:4px 8px;flex-shrink:0}
.ph-del:active{color:#f55}
.ph-body{border-top:1px solid var(--bd);display:none}
.ph-body.open{display:block}
.ph-field{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);gap:12px;min-height:58px}
.ph-field:last-child{border-bottom:none}
.ph-fl{font-size:14px;color:var(--tx2);width:90px;flex-shrink:0}
.ph-fi{flex:1;background:none;border:none;color:var(--tx);font-size:17px;font-family:'Barlow',sans-serif;outline:none;min-width:0}
.ph-fi::placeholder{color:var(--tx3)}
.ph-fi[type="date"]{color-scheme:dark}
.ph-sel{flex:1;background:none;border:none;color:var(--tx);font-size:17px;font-family:'Barlow',sans-serif;outline:none;-webkit-appearance:none;cursor:pointer}
.ph-sel option{background:var(--sf2)}
.tog{position:relative;width:44px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--sf3);border-radius:13px;transition:.2s;cursor:pointer}
.tog-sl::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--gold)}
.tog input:checked+.tog-sl::before{transform:translateX(18px)}
.add-phase-btn,.gantt-btn,.del-proj-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:18px;border-radius:8px;font-size:16px;font-family:'Barlow',sans-serif;cursor:pointer;font-weight:600;margin-top:10px}
.add-phase-btn{background:var(--sf);border:1px dashed var(--bd2);color:var(--tx3);margin-top:0}
.add-phase-btn:active{background:var(--sf2)}
.gantt-btn{background:var(--sf);border:1px solid var(--bd2);color:var(--gold)}
.gantt-btn:active{background:var(--sf2)}
.del-proj-btn{background:none;border:1px solid rgba(139,0,0,.35);color:#f77}
.del-proj-btn:active{background:rgba(139,0,0,.12)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sf2);border:1px solid var(--bd2);color:var(--tx);padding:12px 24px;border-radius:24px;font-size:15px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:#f77;color:#f77}
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
.spin{width:28px;height:28px;border:2px solid var(--bd2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
.spin-txt{font-size:14px;color:var(--tx3)}
.gp-header{padding:12px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--sf)}
.gp-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.gp-meta{display:flex;gap:12px;margin-top:4px;flex-wrap:wrap}
.gp-meta span{font-size:13px;color:var(--tx3)}
.gp-meta .pct{color:var(--gold);font-weight:600}
.glegend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--tx3)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.gwrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
.gwrap::-webkit-scrollbar{height:3px;width:3px}
.gwrap::-webkit-scrollbar-thumb{background:var(--red)}
.ginner{min-width:max-content}
.ghead{display:flex;position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--bd)}
.glh{width:120px;flex-shrink:0;padding:6px 10px;font-size:11px;color:var(--tx3);background:var(--bg);border-right:1px solid var(--bd);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.gweeks{display:flex}
.gwk{display:flex;flex-direction:column;border-right:1px solid var(--bd)}
.gwl{font-size:10px;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:600;padding:2px 6px;border-bottom:1px solid var(--bd);background:var(--bg);white-space:nowrap}
.gdays{display:flex}
.gday{font-size:9px;color:var(--tx3);width:28px;text-align:center;padding:3px 0;background:var(--bg)}
.gday.we{color:var(--bd2)}
.gday.td{color:var(--gold);font-weight:700}
.grow{display:flex;align-items:stretch;border-bottom:1px solid var(--bd);min-height:52px}
.gpl{width:120px;flex-shrink:0;padding:6px 10px;background:var(--bg);border-right:1px solid var(--bd);position:sticky;left:0;z-index:10;display:flex;flex-direction:column;justify-content:center}
.gpt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-family:'Barlow Condensed',sans-serif}
.gpn{font-size:11px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:104px}
.gcells{position:relative;display:flex;align-items:center;flex:1}
.gcell{width:28px;height:100%;flex-shrink:0}
.gcell.we{background:rgba(255,255,255,.012)}
.gcell.td{background:rgba(201,168,76,.05)}
.gbar{position:absolute;top:50%;transform:translateY(-50%);height:28px;border-radius:4px;z-index:5;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;font-family:'Barlow Condensed',sans-serif;min-width:6px}
.today-line{position:absolute;top:0;bottom:0;width:1px;background:var(--gold);z-index:15;opacity:.7;pointer-events:none}
.today-line::before{content:'';position:absolute;top:0;left:-3px;width:7px;height:7px;background:var(--gold);border-radius:50%}
.gprog{padding:10px 16px;border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0;display:flex;align-items:center;gap:10px}
.gprog-bar{flex:1;height:4px;background:var(--bd2);border-radius:2px;overflow:hidden}
.gprog-fill{height:4px;background:var(--gold);border-radius:2px}
.gprog-pct{font-size:13px;color:var(--gold);font-weight:600;min-width:34px;text-align:right}
</style>
</head>
<body>
<div class="screen" id="s-home">
  <div class="hdr">
    <div class="hdr-logo"><svg viewBox="0 0 20 20" fill="none"><path d="M3 10a7 7 0 1 0 14 0A7 7 0 0 0 3 10Z" stroke="#c9a84c" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/><path d="M3 10H1M19 10h-2M10 1V3M10 17v2" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round"/></svg></div>
    <div class="hdr-titles"><div class="hdr-name">Q-Line <span>Editor</span></div><div class="hdr-sub" id="home-sub">Laden...</div></div>
    <div class="sync-dot off" id="sync-dot"></div>
    <button class="ref-btn" id="ref-btn" onclick="doRefresh()"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
  </div>
  <div class="list-bar"><span class="list-cnt" id="list-cnt"></span><button class="new-btn" onclick="newProject()">+ Nieuw project</button></div>
  <div class="proj-list" id="proj-list"><div class="spin-wrap"><div class="spin"></div><span class="spin-txt">Laden...</span></div></div>
</div>
<div class="screen hidden" id="s-edit">
  <div class="hdr">
    <button class="back-btn" onclick="goHome()"><svg class="back-arr" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>Terug</button>
    <div class="hdr-titles"><div class="hdr-name" id="edit-title" style="font-size:17px">Project</div></div>
    <button class="save-btn" id="save-btn" onclick="saveProject()">Opslaan</button>
  </div>
  <div class="edit-scroll" id="edit-body"></div>
</div>
<div class="screen hidden" id="s-gantt">
  <div class="hdr">
    <button class="back-btn" onclick="closeGantt()"><svg class="back-arr" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>Terug</button>
    <div class="hdr-titles"><div class="hdr-name" id="gantt-title" style="font-size:17px">Strokenplanning</div></div>
  </div>
  <div class="gp-header">
    <div class="gp-name" id="g-name"></div>
    <div class="gp-meta"><span id="g-dates"></span><span id="g-owner"></span><span class="pct" id="g-pct"></span></div>
  </div>
  <div class="glegend" id="g-legend"></div>
  <div class="gwrap" id="gwrap"></div>
  <div class="gprog">
    <span style="font-size:12px;color:var(--tx3)" id="g-prog-lbl">Voortgang</span>
    <div class="gprog-bar"><div class="gprog-fill" id="g-prog-fill" style="width:0%"></div></div>
    <span class="gprog-pct" id="g-prog-pct">0%</span>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var FB_URL='https://q-line-planning-default-rtdb.europe-west1.firebasedatabase.app/plannerData.json';
var LS_KEY='pp-planner-v7';var DW=28;
var TYPE_COLORS={outsourcing:'#8B0000',installation:'#1a4a7a',production:'#1a5c3a',transport:'#7a6000',engineering:'#4a1a6a',buying:'#6a1a3a'};
var TYPE_TEXT={outsourcing:'#ff8080',installation:'#80b4e8',production:'#80d4a8',transport:'#ffd980',engineering:'#c980ff',buying:'#ff80b4'};
var TYPE_NL={outsourcing:'Uitbesteding',installation:'Installatie',production:'Productie',transport:'Transport',engineering:'Engineering',buying:'Inkoop'};
var projects=[];var curProj=null;var isDirty=false;
function ymd(d){var x=(d instanceof Date)?d:new Date(d+'T00:00:00');return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2);}
function addDay(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return ymd(d);}
function buildDays(s,e){var r=[],c=s,g=0;while(c<=e&&g++<500){r.push(c);c=addDay(c,1);}return r;}
function fmtDate(s){if(!s)return '';try{return new Date(s+'T00:00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}catch(e){return s;}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isWE(s){var w=new Date(s+'T00:00:00').getDay();return w===0||w===6;}
function isToday(s){return ymd(new Date())===s;}
function toast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(t||'');setTimeout(function(){el.className='toast';},2500);}
function show(id){['s-home','s-edit','s-gantt'].forEach(function(s){var el=document.getElementById(s);if(s===id)el.classList.remove('hidden');else el.classList.add('hidden');});}
function setSaved(ok){document.getElementById('sync-dot').className=ok?'sync-dot':'sync-dot off';var n=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});document.getElementById('home-sub').textContent=ok?'Bijgewerkt '+n:'Lokale data';}
function loadData(){var l=localStorage.getItem(LS_KEY);if(l){try{var d=JSON.parse(l);if(d&&d.projects&&d.projects.length){projects=d.projects.sort(function(a,b){return a.start<b.start?-1:1;});setSaved(false);renderList();}}catch(e){}}
var ctrl=new AbortController();var tmr=setTimeout(function(){ctrl.abort();},8000);
fetch(FB_URL+'?t='+Date.now(),{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(d){clearTimeout(tmr);if(d&&d.projects&&d.projects.length){projects=d.projects.sort(function(a,b){return a.start<b.start?-1:1;});localStorage.setItem(LS_KEY,JSON.stringify(d));setSaved(true);renderList();}}).catch(function(){clearTimeout(tmr);});}
function doRefresh(){var b=document.getElementById('ref-btn');b.classList.add('spin');var ctrl=new AbortController();var tmr=setTimeout(function(){ctrl.abort();},8000);fetch(FB_URL+'?t='+Date.now(),{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(d){clearTimeout(tmr);if(d&&d.projects&&d.projects.length){projects=d.projects.sort(function(a,b){return a.start<b.start?-1:1;});localStorage.setItem(LS_KEY,JSON.stringify(d));setSaved(true);renderList();}b.classList.remove('spin');}).catch(function(){clearTimeout(tmr);b.classList.remove('spin');setSaved(false);});}
function renderList(){document.getElementById('list-cnt').textContent=projects.length+' projecten';var el=document.getElementById('proj-list');if(!projects.length){el.innerHTML='<div style="padding:60px 16px;text-align:center;color:var(--tx3)">Geen projecten</div>';return;}el.innerHTML=projects.map(function(p){return '<div class="pcard" onclick="openEdit('+p.id+')"><div class="pcard-info"><div class="pcard-name">'+esc(p.name||'Naamloos')+'</div><div class="pcard-meta">'+esc(p.owner||'')+' | '+fmtDate(p.start)+' - '+fmtDate(p.end)+' | '+(p.phases||[]).length+' fases</div></div><div class="pcard-chev">&#8250;</div></div>';}).join('');}
function openEdit(id){var f=null;for(var i=0;i<projects.length;i++){if(projects[i].id===id){f=projects[i];break;}}if(!f)return;curProj=JSON.parse(JSON.stringify(f));isDirty=false;renderEditForm();show('s-edit');document.getElementById('edit-body').scrollTop=0;}
function newProject(){var t=ymd(new Date());curProj={id:Date.now(),name:'',owner:'',orderNr:'',start:t,end:t,phases:[],open:false,cp:false};isDirty=true;renderEditForm();show('s-edit');}
function goHome(){if(isDirty&&!confirm('Wijzigingen niet opgeslagen. Toch terug?'))return;curProj=null;isDirty=false;show('s-home');}
function markDirty(){isDirty=true;var b=document.getElementById('save-btn');b.textContent='Opslaan*';b.classList.add('dirty');b.disabled=false;}
function renderEditForm(){document.getElementById('edit-title').textContent=curProj.name||'Project';var sb=document.getElementById('save-btn');sb.textContent=isDirty?'Opslaan*':'Opslaan';sb.className='save-btn'+(isDirty?' dirty':'');sb.disabled=false;
var ph=curProj.phases||[];
document.getElementById('edit-body').innerHTML='<div class="sec-head">Projectgegevens</div><div class="fgroup">'+fr('Naam','<input class="finput" placeholder="Projectnaam" value="'+esc(curProj.name)+'" oninput="sF('name',this.value)" onchange="sF('name',this.value)">')+fr('Eigenaar','<input class="finput" value="'+esc(curProj.owner)+'" oninput="sF('owner',this.value)" onchange="sF('owner',this.value)">')+fr('Ordernr.','<input class="finput" value="'+esc(curProj.orderNr)+'" oninput="sF('orderNr',this.value)" onchange="sF('orderNr',this.value)">')+fr('Start','<input class="finput" type="date" value="'+(curProj.start||'')+'" onchange="sF('start',this.value)" oninput="sF('start',this.value)">')+fr('Einde','<input class="finput" id="proj-end-input" type="date" value="'+(curProj.end||'')+'" onchange="sF('end',this.value)" oninput="sF('end',this.value)">')+'</div><div class="sec-head">Fases</div><div class="phases-list" id="phases-list">'+ph.map(rPh).join('')+'</div><button class="add-phase-btn" onclick="addPh()">+ Fase toevoegen</button><button class="gantt-btn" onclick="openGantt()">Bekijk strokenplanning</button><button class="del-proj-btn" onclick="delProj()">Verwijder project</button>';}
function fr(l,i){return '<div class="frow"><span class="flabel">'+l+'</span>'+i+'</div>';}
function rPh(ph){var c=TYPE_COLORS[ph.type]||'#555';var cT=TYPE_TEXT[ph.type]||'#ccc';var nl=TYPE_NL[ph.type]||ph.type;var oc=ph._open?' open':'';return '<div class="phcard" id="ph-'+ph.id+'"><div class="ph-hdr" onclick="togPh('+ph.id+')"><div class="ph-dot" style="background:'+c+'"></div><div class="ph-label"><div class="ph-type" style="color:'+cT+'">'+nl+'</div><div class="ph-note">'+esc(ph.note||'')+'&nbsp;&nbsp;'+fmtDate(ph.start)+' - '+fmtDate(ph.end)+'</div></div><button class="ph-del" onclick="event.stopPropagation();dPh('+ph.id+')">&#215;</button></div><div class="ph-body'+oc+'" id="phb-'+ph.id+'"><div class="ph-field"><span class="ph-fl">Type</span><select class="ph-sel" onchange="sPh('+ph.id+','type',this.value)">'+Object.keys(TYPE_NL).map(function(k){return '<option value="'+k+'"'+(ph.type===k?' selected':'')+'>'+TYPE_NL[k]+'</option>';}).join('')+'</select></div><div class="ph-field"><span class="ph-fl">Notitie</span><input class="ph-fi" value="'+esc(ph.note)+'" oninput="sPh('+ph.id+','note',this.value)" onchange="sPh('+ph.id+','note',this.value)"></div><div class="ph-field"><span class="ph-fl">Start</span><input class="ph-fi" type="date" value="'+(ph.start||'')+'" onchange="sPh('+ph.id+','start',this.value)" oninput="sPh('+ph.id+','start',this.value)"></div><div class="ph-field"><span class="ph-fl">Einde</span><input class="ph-fi" type="date" value="'+(ph.end||'')+'" onchange="sPh('+ph.id+','end',this.value)" oninput="sPh('+ph.id+','end',this.value)"></div><div class="ph-field"><span class="ph-fl">Weekends</span><label class="tog"><input type="checkbox" '+(ph.includeWeekends?'checked':'')+' onchange="sPh('+ph.id+','includeWeekends',this.checked)"><span class="tog-sl"></span></label></div></div></div>';}
function togPh(id){var ph=gPh(id);if(ph)ph._open=!ph._open;var b=document.getElementById('phb-'+id);if(b)b.classList.toggle('open');}
function sF(k,v){curProj[k]=v;if(k==='name')document.getElementById('edit-title').textContent=v||'Project';markDirty();}
function gPh(id){for(var i=0;i<curProj.phases.length;i++){if(curProj.phases[i].id===id)return curProj.phases[i];}return null;}
function sPh(id,k,v){var ph=gPh(id);if(!ph)return;ph[k]=v;
if(k==='end'&&v&&curProj.end&&v>curProj.end){curProj.end=v;var ei=document.getElementById('proj-end-input');if(ei)ei.value=v;}
if(k==='start'&&v&&curProj.start&&v<curProj.start){curProj.start=v;var si=document.querySelector('#edit-body .frow .finput[type=date]');if(si)si.value=v;}
markDirty();updPhHdr(id);}
function updPhHdr(id){var ph=gPh(id);if(!ph)return;var card=document.getElementById('ph-'+id);if(!card)return;var c=TYPE_COLORS[ph.type]||'#555';var cT=TYPE_TEXT[ph.type]||'#ccc';var nl=TYPE_NL[ph.type]||ph.type;var d=card.querySelector('.ph-dot');var tEl=card.querySelector('.ph-type');var nEl=card.querySelector('.ph-note');if(d)d.style.background=c;if(tEl){tEl.style.color=cT;tEl.textContent=nl;}if(nEl)nEl.textContent=(ph.note||'')+'  '+fmtDate(ph.start)+' - '+fmtDate(ph.end);}
function addPh(){var t=ymd(new Date());var np={id:Date.now(),type:'installation',note:'',start:t,end:t,includeWeekends:false,linked:false,_open:true};curProj.phases.push(np);markDirty();var l=document.getElementById('phases-list');var div=document.createElement('div');div.innerHTML=rPh(np);l.appendChild(div.firstElementChild);setTimeout(function(){l.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function dPh(id){if(!confirm('Fase verwijderen?'))return;curProj.phases=curProj.phases.filter(function(p){return p.id!==id;});markDirty();var c=document.getElementById('ph-'+id);if(c)c.remove();}
function delProj(){if(!confirm('Project "'+(curProj.name||'?')+'" definitief verwijderen?'))return;projects=projects.filter(function(p){return p.id!==curProj.id;});saveAll(true);}
function saveProject(){var b=document.getElementById('save-btn');b.textContent='Opslaan...';b.disabled=true;b.className='save-btn saving';
var cl=JSON.parse(JSON.stringify(curProj));cl.phases.forEach(function(p){delete p._open;});
var ix=-1;for(var i=0;i<projects.length;i++){if(projects[i].id===curProj.id){ix=i;break;}}if(ix>=0)projects[ix]=cl;else projects.push(cl);
projects.sort(function(a,b){return a.start<b.start?-1:1;});saveAll(false);}
function saveAll(gh){var b=document.getElementById('save-btn');var pl={projects:projects};
fetch(FB_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(pl)}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(){localStorage.setItem(LS_KEY,JSON.stringify(pl));setSaved(true);isDirty=false;toast('Opgeslagen','ok');renderList();
if(gh){setTimeout(function(){curProj=null;show('s-home');},600);}else{setTimeout(function(){b.textContent='Opslaan';b.disabled=false;b.className='save-btn';document.getElementById('edit-title').textContent=curProj.name||'Project';},1500);}}).catch(function(e){toast('Fout: '+e.message,'err');if(b){b.textContent='Opslaan*';b.disabled=false;b.className='save-btn dirty';}});}
function openGantt(){if(!curProj)return;var proj=curProj;var ph=proj.phases||[];var today=ymd(new Date());
var rs=proj.start,re=proj.end;
ph.forEach(function(p){if(p.start&&p.start<rs)rs=p.start;if(p.end&&p.end>re)re=p.end;});
var sMs=new Date(rs+'T00:00:00').getTime(),eMs=new Date(re+'T00:00:00').getTime();
var tot=Math.max(1,Math.round((eMs-sMs)/86400000));
var pct=Math.round(Math.max(0,Math.min(Math.round((new Date(today+'T00:00:00').getTime()-sMs)/86400000),tot))/tot*100);
document.getElementById('gantt-title').textContent=proj.name||'Planning';
document.getElementById('g-name').textContent=proj.name||'';
document.getElementById('g-dates').textContent=fmtDate(proj.start)+' - '+fmtDate(proj.end);
document.getElementById('g-owner').textContent=proj.owner||'';
document.getElementById('g-pct').textContent=pct+'%';
document.getElementById('g-prog-fill').style.width=pct+'%';
document.getElementById('g-prog-pct').textContent=pct+'%';
document.getElementById('g-prog-lbl').textContent=pct>=100?'Afgerond':pct>50?'Op schema':'In uitvoering';
var st={};ph.forEach(function(p){st[p.type]=true;});
document.getElementById('g-legend').innerHTML=Object.keys(st).map(function(t){return '<div class="leg-item"><div class="leg-dot" style="background:'+(TYPE_COLORS[t]||'#333')+'"></div>'+(TYPE_NL[t]||t)+'</div>';}).join('');
var gD=buildDays(rs,re),tIdx=gD.indexOf(today);
var tL=tIdx>=0?'<div class="today-line" style="left:'+(tIdx*DW+DW/2)+'px"></div>':'';
var wks=[],i=0;
while(i<gD.length){var wd=[],j=i;while(j<gD.length){wd.push(gD[j]);j++;if(j<gD.length&&new Date(gD[j]+'T00:00:00').getDay()===1)break;}var dt=new Date(gD[i]+'T00:00:00');var j1=new Date(dt.getFullYear(),0,1);wks.push({wn:Math.ceil(((dt-j1)/86400000+j1.getDay()+1)/7),days:wd});i=j;}
var html='<div class="ginner"><div class="ghead"><div class="glh">Fase</div><div class="gweeks">';
wks.forEach(function(w){html+='<div class="gwk"><div class="gwl" style="min-width:'+(w.days.length*DW)+'px">W'+w.wn+'</div><div class="gdays">';
w.days.forEach(function(d){var dt2=new Date(d+'T00:00:00');var dn=['Z','M','D','W','D','V','Z'];html+='<div class="gday '+(isWE(d)?'we':'')+(isToday(d)?' td':'')+'">'+(isToday(d)?'*':dn[dt2.getDay()])+'<br>'+dt2.getDate()+'</div>';});
html+='</div></div>';});
html+='</div></div>';
ph.forEach(function(p){var c=TYPE_COLORS[p.type]||'#333';var cT=TYPE_TEXT[p.type]||'#ccc';var lb=TYPE_NL[p.type]||p.type;
var si=gD.indexOf(p.start),ei=gD.indexOf(p.end);
var si2=si>=0?si:0,ei2=ei>=0?ei:gD.length-1;
var bl=si2*DW,bw=Math.max(DW,(ei2-si2+1)*DW);
html+='<div class="grow"><div class="gpl"><div class="gpt" style="color:'+cT+'">'+lb+'</div>'+(p.note?'<div class="gpn">'+esc(p.note)+'</div>':'')+
'</div><div class="gcells" style="width:'+(gD.length*DW)+'px">'+tL+
gD.map(function(d){return '<div class="gcell'+(isWE(d)?' we':'')+(isToday(d)?' td':'')+'"></div>';}).join('')+
'<div class="gbar" style="left:'+bl+'px;width:'+bw+'px;background:'+c+';color:'+cT+';box-shadow:0 0 0 1px '+c+'80">'+esc(p.note||lb)+'</div></div></div>';});
html+='</div>';
document.getElementById('gwrap').innerHTML=html;
var wrap=document.getElementById('gwrap');wrap.scrollTop=0;wrap.scrollLeft=0;
setTimeout(function(){if(tIdx>3)wrap.scrollLeft=Math.max(0,(tIdx-3)*DW);},50);
show('s-gantt');}
function closeGantt(){show('s-edit');}
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(sw){sw.unregister();});});caches.keys().then(function(k){k.forEach(function(c){caches.delete(c);});});}
loadData();
</script>
</body>
